<head>
    <meta charset="UTF-8" />

    <!-- Font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Bootstrap 5.3 CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Unicons CSS -->
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css" />
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary py-3 px-5">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">MyPictures</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" aria-current="page" href="index.html">Beranda</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="album.html">Album</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="tambah.html">Buat</a>
                        </li>
                    </ul>
                </ul>
                <form class="d-flex input-group w-auto">
                    <input type="search" class="form-control rounded" placeholder="Search" aria-label="Search"
                        aria-describedby="search-addon" />
                    <button type="submit" class="btn btn-primary d-none">
                        <i class="fas fa-search"></i>
                    </button>
                </form>
                <ul class="navbar-nav ms-2 mb-lg-0">
                    <li class="nav-item dropdown dropstart">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false">
                            Profile
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="profile.html">Profile</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    <div class="container-xl my-3">
        <div class="card-detail">
            <form action="" method="post">
                <div class="row">
                    <div class="col-lg-5 col-12">
                        <div class="container">
                            <div class="row justify-content-end">
                                <label for="image-input" class="col-auto custom-file-label mt-3"><i
                                        class="fas fa-plus"></i></label>
                                <input type="file" id="image-input" class="custom-file-input" accept="image/*"
                                    style="display: none;">
                            </div>
                            <div class="row justify-content-center">
                                <img id="image-preview" src="#" alt="Image Preview">
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-7 py-3 px-5">
                        <h3 class="mb-3">Postingan</h3>

                        <div class="mb-3">
                            <label for="title" class="form-label">Judul</label>
                            <input type="text" class="form-control" name="title" id="title" required>
                        </div>
                        <div class="mb-3">
                            <label for="deskripsi" class="form-label">Deskripsi <label for=""
                                    class="text-muted">(maksimal 150 karakter)</label></label>
                            <textarea class="form-control" name="deskripsi" maxlength="150" id="deskripsi" rows="3"
                                required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="status" class="form-label">Status <label for=""
                                    class="text-muted">(default:diarsipkan)</label></label>
                            <select class="form-select" id="status" name="status" aria-label="Default select example">
                                <option value="diarsipkan" selected hidden>Status</option>
                                <option value="1">One</option>
                                <option value="2">Two</option>
                                <option value="3">Three</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">Upload</button>
                    </div>
                </div>
        </div>
        </form>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="script.js" defer></script>
</body>

</html>
